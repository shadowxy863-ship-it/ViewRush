<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ViewRush</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>
<h1>⚡ ViewRush</h1>
</nav>


<section class="hero">
<h2>Grow Your Channel <br> <span>With ViewRush</span></h2>
<p>Smart creator growth platform</p>
</section>


<div class="box">

<h2>Free Trial Views</h2>

<input id="url" placeholder="Paste YouTube Video URL">

<button id="btn" onclick="start()">Get Views 🚀</button>

<div id="processBox" class="process">

<h3>⏳ Processing Order</h3>

<div class="bar">
<div id="progress"></div>
</div>

<h2 id="percent">0%</h2>

</div>


<div id="done" class="done">

<h2>✅ Order Submitted</h2>
<p id="info"></p>

</div>

</div>


<!-- FREE TRIAL MESSAGE (hidden first) -->
<div id="trial" class="trial">
<h2>🎁 Free Trial Used</h2>
<p>Your next order will be available after 12 hours</p>
</div>


<footer>© 2026 ViewRush</footer>

<script src="script.js"></script>

</body>
</html>
